<div class="p-6">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold">Awards Management</h1>
      <p class="text-gray-300 text-sm">
        Manage ESOPs and RSUs across employees
      </p>
    </div>

    <button
  routerLink="/admin/awards/create"
  class="bg-green-500 text-black px-5 py-2 rounded font-semibold hover:bg-green-600"
>
  New Award
</button>
  </div>

  <!-- SEARCH -->
  <div class="flex items-center gap-4 mb-8">
    <input
      type="text"
      [(ngModel)]="searchText"
      placeholder="Search"
      class="w-[400px] p-2 rounded text-black shadow-lg"
    />

    <button class="bg-blue-500 px-4 py-2 rounded">
      Search
    </button>
  </div>

  <!-- TABLE CARD -->
  <div class="bg-gray-200 text-black p-6 rounded">

    <h2 class="text-xl font-semibold mb-4">Existing Awards</h2>

    <table class="w-full">

      <!-- HEAD -->
      <thead class="bg-[#0B1437] text-white">
        <tr>
          <th class="p-3 text-left">Employee Id</th>
          <th class="p-3 text-left">Employee Name</th>
          <th class="p-3 text-left">ESOP</th>
          <th class="p-3 text-left">RSU</th>
          <th class="p-3 text-left">Action</th>
        </tr>
      </thead>

      <!-- BODY -->
      <tbody>
        <tr *ngFor="let award of awards" class="border-b">

          <td class="p-3">{{ award.id }}</td>
          <td class="p-3">{{ award.name }}</td>
          <td class="p-3">{{ award.esop }}</td>
          <td class="p-3">{{ award.rsu }}</td>

          <td class="p-3 flex gap-2">
            <button class="bg-green-500 text-white px-3 py-1 rounded">
              Edit
            </button>

            <button class="bg-red-500 text-white px-3 py-1 rounded">
              Delete
            </button>
          </td>

        </tr>
      </tbody>

    </table>

  </div>

</div>
