<div class="p-6">

  <!-- HEADER -->
  <div class="mb-8">
    <h1 class="text-3xl font-bold mb-2">Notifications</h1>
    <p class="text-gray-400 text-sm">Stay updated with your equity award information</p>
  </div>

  <!-- NOTIFICATIONS LIST -->
  <div class="space-y-4">
    <div *ngFor="let notification of notifications" class="bg-[#1a2a52] rounded-lg p-6 border border-gray-700 hover:border-blue-500 transition-all">
      
      <!-- Notification Header -->
      <div class="flex items-start justify-between mb-3">
        <div class="flex-1">
          <h2 class="text-xl font-semibold text-white mb-1">{{ notification.title }}</h2>
          <p class="text-sm text-gray-400">{{ notification.date }}</p>
        </div>
      </div>

      <!-- Notification Message -->
      <p class="text-gray-300 leading-relaxed">{{ notification.message }}</p>

    </div>

    <!-- Empty State -->
    <div *ngIf="notifications.length === 0" class="bg-[#1a2a52] rounded-lg p-12 border border-gray-700 text-center">
      <p class="text-gray-400 text-lg">No notifications yet</p>
    </div>

  </div>

</div>
