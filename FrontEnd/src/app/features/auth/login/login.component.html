<div class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="flex w-[900px] bg-white shadow-lg rounded-lg overflow-hidden">

    <!-- LEFT SIDE -->
    <div class="w-1/2 p-10 flex flex-col justify-center">
      <h2 class="text-2xl font-semibold text-gray-700 mb-4">
        Welcome to EquiMatrix
      </h2>

      <p class="text-gray-500 text-sm leading-relaxed">
        Manage and track equity awards, employee data, and organizational insights 
        in one unified platform. Designed for both administrators and employees 
        to stay informed and in control.
      </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="w-1/2 bg-[#0B1437] p-8 text-white rounded-l-[40px]">

      <h2 class="text-xl font-bold mb-6 text-center">
        Login to your account
      </h2>

      <form (ngSubmit)="onLogin()">

        <!-- Email -->
        <div class="mb-4">
          <label class="text-sm">Email</label>
          <input type="email"
                 [(ngModel)]="email"
                 name="email"
                 class="w-full mt-1 p-2 rounded text-black"
                 required>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="text-sm">Password</label>
          <input type="password"
                 [(ngModel)]="password"
                 name="password"
                 class="w-full mt-1 p-2 rounded text-black"
                 required>
        </div>

        <!-- Remember -->
        <div class="flex items-center mb-4">
          <input type="checkbox" class="mr-2">
          <label class="text-sm">Remember me</label>
        </div>

        <!-- Button -->
        <button class="w-full bg-[#5B6CFF] text-white-600 py-2 rounded font-semibold">
          Login
        </button>

        <p class="text-center text-sm mt-4 underline cursor-pointer">
          Forgot Password?
        </p>

      </form>
    </div>

  </div>
</div>
