<div class="w-64 h-screen bg-[#FAFAFA] text-slate-700 flex flex-col p-4">

  <!-- LOGO -->
  <div class="flex items-center gap-3 mb-10">
    <img
      src="assets/NewLogo.png"
      alt="EquiMatrix Logo"
      class="h-14 object-contain"
    />
  </div>

  <!-- MENU -->
  <nav class="flex flex-col gap-3 text-sm">

    <!-- DASHBOARD -->
    <a  
      routerLink="/admin"
      routerLinkActive="text-[#22C55E]"
      [routerLinkActiveOptions]="{ exact: true }"
      #rlaDashboard="routerLinkActive"
      class="flex items-center justify-between px-4 py-2 rounded-xl group"
      [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaDashboard.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaDashboard.isActive
      }"
    >
      <span class="font-medium">
        Dashboard
      </span>
    </a>

    <!-- EMPLOYEES -->
    <a
      routerLink="/admin/employees"
      routerLinkActive="text-[#22C55E]"
      #rlaUsers="routerLinkActive"
      class="flex items-center justify-between px-4 py-2 rounded-xl group"
      [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaUsers.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaUsers.isActive
      }"
    >
      <span class="font-medium">
        Employees
      </span>
    </a>

    <!-- AWARDS -->
    <a
      routerLink="/admin/awards"
      routerLinkActive="text-[#22C55E]"
      #rlaAwards="routerLinkActive"
      class="flex items-center justify-between px-4 py-2 rounded-xl group"
      [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaAwards.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaAwards.isActive
      }"
    >
      <span class="font-medium">
        Awards
      </span>
    </a>

    <!-- EXERCISE -->
    <a
      routerLink="/admin/exercise"
      routerLinkActive="text-[#22C55E]"
      #rlaExercise="routerLinkActive"
      class="flex items-center justify-between px-4 py-2 rounded-xl group"
      [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaExercise.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaExercise.isActive
      }"
    >
      <span class="font-medium">
        Exercise Requests
      </span>
    </a>

    <!-- REPORTS -->
    <a
      routerLink="/admin/reports"
      routerLinkActive="text-[#22C55E]"
      #rlaReports="routerLinkActive"
      class="flex items-center justify-between px-4 py-2 rounded-xl group"
      [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaReports.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaReports.isActive
      }"
    >
      <span class="font-medium">
        Reports
      </span>
    </a>

    <!-- NOTIFICATIONS -->
    <a
      routerLink="/admin/notifications"
      routerLinkActive="text-[#22C55E]"
      #rlaNotif="routerLinkActive"
      class="flex items-center justify-between px-4 py-2 rounded-xl group"
      [ngClass]="{
        'bg-[#D1FADF] text-[#22C55E]': rlaNotif.isActive,
        'hover:bg-slate-100 text-slate-600': !rlaNotif.isActive
      }"
    >
      <span class="font-medium">
        Notifications
      </span>
    </a>

  </nav>

</div>
